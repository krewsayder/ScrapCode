# Alembic config for the SQLite backend (ADR-006 D3).
# The sqlalchemy.url is resolved in env.py (from `sqlalchemy.url` set on
# the config, or SCRAPCODE_DB_PATH, or a default `clusters.db`).
[alembic]
script_location = bot/db/alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S