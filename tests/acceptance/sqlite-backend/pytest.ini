[pytest]
# Acceptance test suite for the sqlite-backend feature (DISTILL wave).
# Plain pytest + pytest-asyncio. No pytest-bdd — the .feature files are the
# human-readable scenario SSOT; the test modules are the executable specs.
asyncio_mode = auto
# Worktree root (3 levels up) so `import bot.*` resolves at collection time.
pythonpath = . ../../..
testpaths = .
# Only collect test_*.py modules — do NOT try to collect the .feature files
# as Python.
python_files = test_*.py
addopts = -ra